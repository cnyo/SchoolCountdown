services:
  # Service de développement
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: school-countdown-dev
    volumes:
      # Synchronisation du code source
      - .:/app
      # Optimisation: ne pas synchroniser node_modules
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NG_CLI_ANALYTICS=false
    stdin_open: true
    tty: true
    networks:
      - school-countdown-network

  # Service de production
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-countdown-prod
    restart: unless-stopped
    networks:
      - school-countdown-network

networks:
  school-countdown-network:
    driver: bridge
