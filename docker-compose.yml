services:
  school-countdown:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: development
    container_name: school-countdown
    ports:
      - "9002:80"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    networks:
      - school-countdown-network

networks:
  school-countdown-network:
    driver: bridge
